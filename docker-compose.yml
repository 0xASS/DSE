services:
  redis-master:
    image: redis:7.2-alpine
    container_name: redis-master
    command: >
      redis-server 
      --save 60 1 
      --loglevel notice
    ports:
      - "6379:6379"
    networks:
      dse_redis_net:
        ipv4_address: 172.20.0.2

  redis-replica:
    image: redis:7.2-alpine
    container_name: redis-replica
    command: >
      redis-server 
      --replicaof redis-master 6379
      --replica-read-only yes
    ports:
      - "6380:6379"
    depends_on:
      - redis-master
    networks:
      dse_redis_net:
        ipv4_address: 172.20.0.3

networks:
  dse_redis_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16